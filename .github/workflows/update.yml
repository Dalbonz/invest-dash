name: Update Dashboard Data

on:
  schedule:
    - cron: '0 21 * * *'   # KST 06:00 (개인채널 유튜브 체크)
    - cron: '0 23 * * *'   # KST 08:00 (개인채널 유튜브 체크)
    - cron: '30 23 * * *'  # KST 08:30 (전체 실행 + 아침 브리핑)
    - cron: '0 1 * * *'    # KST 10:00 (개인채널 유튜브 체크)
    - cron: '0 6 * * *'    # KST 15:00 (전체 실행)
    - cron: '0 9 * * *'    # KST 18:00 (전체 실행)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engines
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
        run: python run.py

      - name: Commit data.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m 'auto: update data.json'
          git push
