name: Update Dashboard Data

on:
  workflow_dispatch:
    inputs:
      slot:
        description: '외부cron이 지정하는 실행 슬롯 (yt1/yt2/morning/yt3/email/full/market), 수동테스트는 빈값'
        required: false
        default: ''
      force_email:
        description: '이메일 강제 발송 테스트 (true/false)'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engines
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SLOT: ${{ github.event.inputs.slot }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email }}
        run: python run.py

      - name: Commit data.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m 'auto: update data.json'
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push 충돌, rebase 후 재시도 ($i)"
            git pull --rebase origin main
            sleep 3
          done
          git push
