<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Invest Dash</title>
<style>
:root {
  --bg: #f5f5f7;
  --bg2: #ffffff;
  --bg3: #f2f2f7;
  --border: #d2d2d7;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --accent: #0071e3;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --purple: #af52de;
  --tab-h: 49px;
  --header-h: 52px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#000000; --bg2:#1c1c1e; --bg3:#2c2c2e;
    --border:#3a3a3c; --text:#f5f5f7; --text2:#aeaeb2; --text3:#636366;
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Noto Sans KR',sans-serif;font-size:15px;min-height:100vh;overscroll-behavior:none;}

/* 헤더 */
header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:rgba(255,255,255,0.85);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
}
@media(prefers-color-scheme:dark){
  header{background:rgba(0,0,0,0.85);}
}
.logo{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.updated{font-size:12px;color:var(--text3);}

/* 탭바 */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);
  background:rgba(255,255,255,0.92);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  .tabbar{background:rgba(28,28,30,0.92);}
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;
  transition:color 0.15s;padding-top:6px;
}
.tab.active{color:var(--accent);}
.tab-icon{font-size:22px;line-height:1;}

/* 메인 */
main{
  padding-top:calc(var(--header-h) + 12px);
  padding-bottom:calc(var(--tab-h) + 16px);
  padding-left:16px;padding-right:16px;
}
.page{display:none;}
.page.active{display:block;}

/* 카드 */
.card{background:var(--bg2);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:-0.1px;margin-bottom:12px;text-transform:uppercase;}

/* AI 브리핑 */
.ai-summary{font-size:15px;font-weight:500;line-height:1.6;color:var(--text);margin-bottom:12px;}
.ai-section{margin-bottom:10px;}
.ai-section-text{font-size:14px;line-height:1.6;color:var(--text2);}
.risk-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.risk-dot{width:8px;height:8px;border-radius:50%;}
.risk-label{font-size:13px;font-weight:600;}
.risk-1{background:var(--green);} .risk-2{background:#86efac;} .risk-3{background:var(--orange);} .risk-4{background:#f97316;} .risk-5{background:var(--red);}

/* 시장 지수 그리드 */
.market-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:600px){.market-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.market-grid{grid-template-columns:repeat(4,1fr);}}
.market-item{background:var(--bg2);border-radius:12px;padding:14px;}
.market-name{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px;}
.market-price{font-size:18px;font-weight:600;letter-spacing:-0.5px;margin-bottom:2px;}
.market-change{font-size:13px;font-weight:500;}
.up{color:var(--red);}   /* 한국식: 상승=빨강 */
.down{color:var(--accent);} /* 하락=파랑 */
.flat{color:var(--text3);}

/* 포트폴리오 */
.port-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:600px){.port-summary{grid-template-columns:repeat(4,1fr);}}
.port-stat{background:var(--bg2);border-radius:12px;padding:14px;}
.port-stat-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px;}
.port-stat-value{font-size:17px;font-weight:600;letter-spacing:-0.3px;}

.holdings-list{background:var(--bg2);border-radius:12px;overflow:hidden;}
.holding-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--bg3);
}
.holding-item:last-child{border-bottom:none;}
.holding-left{display:flex;flex-direction:column;gap:2px;}
.holding-name{font-size:15px;font-weight:500;}
.holding-meta{font-size:12px;color:var(--text3);}
.holding-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.holding-value{font-size:15px;font-weight:600;}
.holding-profit{font-size:13px;font-weight:500;}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:4px;}
.tag-kr{background:#ff3b3020;color:var(--red);}
.tag-us{background:#0071e320;color:var(--accent);}

/* 뉴스 */
.news-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:12px;overflow:hidden;}
.news-item{background:var(--bg2);padding:14px 16px;display:flex;flex-direction:column;gap:4px;text-decoration:none;color:inherit;transition:background 0.15s;}
.news-item:active{background:var(--bg3);}
.news-meta{display:flex;gap:8px;align-items:center;}
.news-source{font-size:12px;color:var(--accent);font-weight:600;}
.news-cat{font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:4px;}
.news-title{font-size:14px;line-height:1.5;color:var(--text);}

/* 유튜브 */
.yt-list{display:flex;flex-direction:column;gap:12px;}
.yt-card{background:var(--bg2);border-radius:12px;padding:16px;}
.yt-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.yt-icon{font-size:22px;}
.yt-name{font-size:15px;font-weight:600;}
.yt-time{font-size:12px;color:var(--text3);margin-left:auto;}
.yt-link{font-size:13px;color:var(--accent);margin-bottom:10px;display:block;text-decoration:none;}
.yt-summary{font-size:14px;line-height:1.6;color:var(--text2);white-space:pre-wrap;}

/* 로딩 */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 섹션 타이틀 */
.section-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-bottom:12px;}
</style>
</head>
<body>

<header>
  <div class="logo">📈 Invest Dash</div>
  <div class="updated" id="updated">-</div>
</header>

<!-- 탭 페이지들 -->
<main>
  <!-- 시장 탭 -->
  <div class="page active" id="page-market">
    <div class="loading" id="loading-market"><div class="spinner"></div>불러오는 중...</div>
    <div id="content-market" style="display:none">
      <div class="section-title">시장 브리핑</div>
      <div class="card" id="ai-card" style="display:none">
        <div class="card-title">AI 분석</div>
        <div class="ai-summary" id="ai-summary"></div>
        <div class="ai-section"><div class="ai-section-text" id="ai-kr"></div></div>
        <div class="ai-section"><div class="ai-section-text" id="ai-us"></div></div>
        <div class="ai-section"><div class="ai-section-text" id="ai-pick"></div></div>
        <div class="ai-section"><div class="ai-section-text" id="ai-warn"></div></div>
        <div class="risk-row">
          <div class="risk-dot" id="risk-dot"></div>
          <div class="risk-label" id="risk-label"></div>
        </div>
      </div>
      <div class="section-title" style="margin-top:8px">주요 지수</div>
      <div class="market-grid" id="market-kr"></div>
      <div class="section-title" style="margin-top:4px">미국</div>
      <div class="market-grid" id="market-us"></div>
      <div class="section-title" style="margin-top:4px">환율 · 원자재</div>
      <div class="market-grid" id="market-fx"></div>
    </div>
  </div>

  <!-- 포트폴리오 탭 -->
  <div class="page" id="page-portfolio">
    <div class="loading" id="loading-portfolio" style="display:none"><div class="spinner"></div>불러오는 중...</div>
    <div id="content-portfolio">
      <div class="section-title">내 포트폴리오</div>
      <div class="port-summary" id="port-summary"></div>
      <div class="holdings-list" id="holdings-list"></div>
    </div>
  </div>

  <!-- 뉴스 탭 -->
  <div class="page" id="page-news">
    <div class="section-title">투자 뉴스</div>
    <div class="news-list" id="news-list"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  </div>

  <!-- 유튜브 탭 -->
  <div class="page" id="page-youtube">
    <div class="section-title">YouTube 요약</div>
    <div class="yt-list" id="yt-list"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  </div>
</main>

<!-- 탭바 -->
<div class="tabbar">
  <div class="tab active" onclick="switchTab('market',this)">
    <div class="tab-icon">📊</div><div>시장</div>
  </div>
  <div class="tab" onclick="switchTab('portfolio',this)">
    <div class="tab-icon">💼</div><div>포트폴리오</div>
  </div>
  <div class="tab" onclick="switchTab('news',this)">
    <div class="tab-icon">📰</div><div>뉴스</div>
  </div>
  <div class="tab" onclick="switchTab('youtube',this)">
    <div class="tab-icon">🎬</div><div>유튜브</div>
  </div>
</div>

<script>
const INVEST_DATA = 'https://dalbonz.github.io/invest-dash/data.json';
const YT_DATA = 'https://raw.githubusercontent.com/Dalbonz/4-my-money/main/youtube.json';

const KR_MARKET = ['kospi','kosdaq','samsung','hynix'];
const US_MARKET = ['sp500','nasdaq','nvda','aapl','tsla','msft'];
const FX_MARKET = ['usdkrw','jpykrw','gold','oil'];

const LABELS = {
  kospi:'KOSPI',kosdaq:'KOSDAQ',sp500:'S&P 500',nasdaq:'NASDAQ',
  dow:'DOW',ndx:'NDX',vix:'VIX',usdkrw:'USD/KRW',jpykrw:'JPY/KRW',
  eurkrw:'EUR/KRW',dxy:'DXY',oil:'WTI',brent:'브렌트',gold:'금',silver:'은',
  nvda:'NVDA',aapl:'AAPL',msft:'MSFT',tsla:'TSLA',googl:'GOOGL',
  spy:'SPY',qqq:'QQQ',samsung:'삼성전자',hynix:'SK하이닉스',
};

function fmt(n,dec=0){
  if(n==null||isNaN(n))return'-';
  return Number(n).toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function pctStr(v){if(v==null)return'-';return(v>0?'+':'')+Number(v).toFixed(2)+'%';}
function cls(v){return v>0?'up':v<0?'down':'flat';}

function switchTab(id, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
}

function renderMarketGrid(el, keys, market){
  el.innerHTML = keys.filter(k=>market[k]).map(k=>{
    const d = market[k];
    const c = cls(d.pct);
    return `<div class="market-item">
      <div class="market-name">${LABELS[k]||k}</div>
      <div class="market-price ${c}">${fmt(d.price, ['usdkrw','jpykrw','eurkrw'].includes(k)?2:0)}</div>
      <div class="market-change ${c}">${pctStr(d.pct)}</div>
    </div>`;
  }).join('');
}

function renderAI(ai){
  if(!ai||ai.error)return;
  document.getElementById('ai-card').style.display='block';
  document.getElementById('ai-summary').textContent = ai.summary||'';
  document.getElementById('ai-kr').textContent = ai.kr||'';
  document.getElementById('ai-us').textContent = ai.us||'';
  document.getElementById('ai-pick').textContent = ai.pick||'';
  document.getElementById('ai-warn').textContent = ai.warn||'';
  const risk = ai.risk_level||3;
  const dot = document.getElementById('risk-dot');
  const lbl = document.getElementById('risk-label');
  dot.className = `risk-dot risk-${risk}`;
  const labels = {1:'위험 매우 낮음',2:'위험 낮음',3:'보통',4:'위험 높음',5:'위험 매우 높음'};
  lbl.textContent = labels[risk]||'보통';
}

function renderPortfolio(portfolio){
  const holdings = portfolio.holdings||[];
  let totalValue=0, totalProfit=0, totalCost=0;
  holdings.forEach(h=>{
    const v = parseFloat((h['평가총액(원)']||'').toString().replace(/[₩,\s]/g,''))||0;
    const p = parseFloat((h['원화수익']||'').toString().replace(/[₩,\s]/g,''))||0;
    const c = parseFloat((h['매수총액(원)']||'').toString().replace(/[₩,\s]/g,''))||0;
    totalValue+=v; totalProfit+=p; totalCost+=c;
  });
  const pct = totalCost>0?(totalProfit/totalCost*100):0;
  const pc = cls(totalProfit);

  document.getElementById('port-summary').innerHTML = `
    <div class="port-stat"><div class="port-stat-label">종목수</div><div class="port-stat-value">${holdings.length}개</div></div>
    <div class="port-stat"><div class="port-stat-label">평가금액</div><div class="port-stat-value">${fmt(totalValue)}원</div></div>
    <div class="port-stat"><div class="port-stat-label">총수익</div><div class="port-stat-value ${pc}">${fmt(totalProfit)}원</div></div>
    <div class="port-stat"><div class="port-stat-label">수익률</div><div class="port-stat-value ${pc}">${pctStr(pct)}</div></div>`;

  document.getElementById('holdings-list').innerHTML = holdings.map(h=>{
    const mkt = h['시장']||'';
    const tag = mkt==='국내'?'<span class="tag tag-kr">KR</span>':'<span class="tag tag-us">US</span>';
    const profit = parseFloat((h['원화수익']||'').toString().replace(/[₩,\s]/g,''))||0;
    const pc = cls(profit);
    return `<div class="holding-item">
      <div class="holding-left">
        <div class="holding-name">${h['종목명']||'-'}${tag}</div>
        <div class="holding-meta">${h['섹터']||''} · ${h['보유량']||0}주</div>
      </div>
      <div class="holding-right">
        <div class="holding-value">${h['평가총액(원)']||'-'}</div>
        <div class="holding-profit ${pc}">${h['원화수익']||'-'}</div>
      </div>
    </div>`;
  }).join('');
}

function renderNews(news){
  document.getElementById('news-list').innerHTML = (news||[]).map(n=>`
    <a class="news-item" href="${n.link}" target="_blank" rel="noopener">
      <div class="news-meta">
        <span class="news-source">${n.source}</span>
        ${n.category?`<span class="news-cat">${n.category}</span>`:''}
      </div>
      <div class="news-title">${n.title}</div>
    </a>`).join('');
}

function renderYoutube(yt){
  const channels = yt.channels||[];
  document.getElementById('yt-list').innerHTML = channels.length===0
    ? '<div class="loading">유튜브 요약 없음</div>'
    : channels.map(ch=>`
      <div class="yt-card">
        <div class="yt-header">
          <div class="yt-icon">${ch.icon||'📺'}</div>
          <div class="yt-name">${ch.name||''}</div>
          <div class="yt-time">${ch.updated?new Date(ch.updated).toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>
        <a class="yt-link" href="https://youtube.com/watch?v=${ch.videoId}" target="_blank" rel="noopener">▶ 영상 보기</a>
        <div class="yt-summary">${ch.summary||''}</div>
      </div>`).join('');
}

async function load(){
  try {
    const [investRes, ytRes] = await Promise.allSettled([
      fetch(INVEST_DATA+'?t='+Date.now()),
      fetch(YT_DATA+'?t='+Date.now()),
    ]);

    if(investRes.status==='fulfilled'){
      const data = await investRes.value.json();
      const dt = new Date(data.updated);
      document.getElementById('updated').textContent =
        dt.toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})+' 업데이트';

      if(data.market){
        renderMarketGrid(document.getElementById('market-kr'), KR_MARKET, data.market);
        renderMarketGrid(document.getElementById('market-us'), US_MARKET, data.market);
        renderMarketGrid(document.getElementById('market-fx'), FX_MARKET, data.market);
      }
      if(data.ai) renderAI(data.ai);
      if(data.portfolio) renderPortfolio(data.portfolio);
      if(data.news) renderNews(data.news);

      document.getElementById('loading-market').style.display='none';
      document.getElementById('content-market').style.display='block';
    }

    if(ytRes.status==='fulfilled'){
      const yt = await ytRes.value.json();
      renderYoutube(yt);
    } else {
      document.getElementById('yt-list').innerHTML='<div class="loading">유튜브 데이터 없음</div>';
    }
  } catch(e){
    document.getElementById('loading-market').innerHTML=`<div style="color:var(--red)">오류: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
