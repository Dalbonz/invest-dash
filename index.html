<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Invest Dash</title>
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#f5f5f7;--card:#ffffff;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --border:rgba(0,0,0,0.08);--accent:#0071e3;--green:#1d9e75;--red:#e24b4a;
  --radius:14px;--radius-sm:10px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--card:#2c2c2e;--text:#f5f5f7;--text2:#98989d;--text3:#636366;--border:rgba(255,255,255,0.08);}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.fixed-top{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(245,245,247,0.94);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid var(--border)}
@media(prefers-color-scheme:dark){.fixed-top{background:rgba(28,28,30,0.94);}}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px}
.logo{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.updated-tag{font-size:11px;color:var(--text3)}
.tabbar{display:flex;gap:4px;padding:4px 8px 6px}
.tab{flex:1;font-size:13px;font-weight:500;padding:7px 4px;border:none;border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

.page{display:none;padding-top:90px;padding-bottom:40px}
.page.active{display:block}
.wrap{max-width:720px;margin:0 auto;padding:0 14px}

/* 카드 */
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}

/* AI 시황 */
.ai-section{padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px;color:var(--text);line-height:1.7}
.ai-section:first-child{padding-top:0}
.ai-section:last-child{border-bottom:none;padding-bottom:0}
.ai-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ai-summary-line{font-weight:600;font-size:15px}
.ai-do{color:var(--green)}
.ai-dont{color:var(--red)}

/* 주요 시장 */
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:480px){.market-grid{grid-template-columns:repeat(4,1fr)}}
.market-item{background:var(--bg);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:background .1s}
.market-item:hover{background:var(--border)}
.market-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.market-price{font-size:17px;font-weight:600;color:var(--text)}
.market-chg{font-size:12px;margin-top:2px}
.up{color:var(--red)}.down{color:#1261c4}.flat{color:var(--text3)}

/* 뉴스 필터 */
.news-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.nf-btn{background:transparent;border:0.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;color:var(--text2);padding:4px 12px;cursor:pointer;font-family:inherit;transition:all .15s}
.nf-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.news-item{padding:12px 0;border-bottom:0.5px solid var(--border)}
.news-item:last-child{border-bottom:none;padding-bottom:0}
.news-source{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:4px}
.news-title{font-size:13px;color:var(--text);line-height:1.5;text-decoration:none;display:block}
.news-title:hover{color:var(--accent)}
.news-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
.badge-{background:#f0f0f5;color:var(--text3)}
.badge-속보{background:#fde8e8;color:#c84a31}.badge-분석{background:#e8f0fd;color:#185fa5}
.badge-국내{background:#eaf3de;color:#3b6d11}.badge-미국{background:#fff3e0;color:#b45309}

/* 증시 탭 */
.market-cards-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mcard{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;min-width:0}
.mcard-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mcard-title{font-weight:600;font-size:13px;color:var(--text)}
.cptabs{display:flex;gap:2px}
.cptab{background:transparent;border:0.5px solid var(--border);border-radius:5px;font-size:9px;font-weight:600;color:var(--text3);padding:2px 5px;cursor:pointer;font-family:inherit}
.cptab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.mcard-subtabs{display:flex;gap:4px;margin-bottom:6px}
.mcard-subtab{background:transparent;border:0.5px solid var(--border);border-radius:8px;font-size:10px;font-weight:600;color:var(--text2);padding:2px 8px;cursor:pointer;font-family:inherit}
.mcard-subtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chart-box{height:76px;margin:3px 0;position:relative;overflow:hidden}
.mrow{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 2px;border-bottom:0.5px solid var(--border);cursor:pointer;border-radius:4px;transition:background .1s}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:var(--bg)}
.mrow-name{font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}

/* 주식시세 */
.stock-sec{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.stock-sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stock-sec-title{font-size:14px;font-weight:600}
.stock-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.stock-tabs::-webkit-scrollbar{display:none}
.stock-tab{background:transparent;border:0.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;color:var(--text2);padding:4px 14px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.stock-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.edit-btn{background:transparent;border:0.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--accent);padding:4px 10px;cursor:pointer;font-family:inherit}
.tw{overflow-x:auto}
.stock-scroll-y{max-height:200px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--bg);color:var(--text3);font-weight:600;padding:6px 4px;text-align:right;border-bottom:0.5px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:1}
th:first-child{text-align:left}
td{padding:5px 4px;text-align:right;border-bottom:0.5px solid var(--border);white-space:nowrap}
td:first-child{text-align:left;font-weight:600;cursor:pointer;color:var(--accent)}
td:first-child:hover{text-decoration:underline}
tr:hover td{background:var(--bg)}

/* ETF */
.etf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.etf-grid{grid-template-columns:repeat(3,1fr)}}
.etfc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:background .1s}
.etfc:hover{background:var(--card)}
.etf-sector{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.etfn{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:2px}
.etfp{font-size:15px;font-weight:800;color:var(--text)}
.etfch{font-size:11px;font-weight:600;margin-top:1px}

/* 상세팝업 */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300}
.overlay.show{display:block}
.detail-panel{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(720px,100%);background:var(--card);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.15);padding:16px;z-index:301;max-height:82vh;overflow-y:auto}
.detail-panel.show{display:block}
.detail-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1}
.detail-name{font-size:18px;font-weight:700;margin-bottom:2px;color:var(--text)}
.detail-price{font-size:26px;font-weight:700;margin:6px 0}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.detail-item{background:var(--bg);border-radius:var(--radius-sm);padding:8px;text-align:center}
.detail-item .dl{font-size:10px;color:var(--text3);margin-bottom:3px}
.detail-item .dv{font-size:12px;font-weight:700;color:var(--text)}
.detail-chart-wrap{height:220px;margin:8px 0}
.detail-tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.detail-tab{background:transparent;border:0.5px solid var(--border);border-radius:8px;font-size:10px;font-weight:600;color:var(--text2);padding:4px 10px;cursor:pointer;font-family:inherit}
.detail-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.period-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.ps-item{background:var(--bg);border-radius:var(--radius-sm);padding:8px;text-align:center}
.ps-item .pl{font-size:10px;color:var(--text3);margin-bottom:3px}
.ps-item .pv{font-size:13px;font-weight:700;color:var(--text)}

/* 미디어 탭 */
.media-subtabs{display:flex;gap:6px;margin-bottom:12px}
.media-subtab{background:transparent;border:0.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:var(--text2);padding:5px 14px;cursor:pointer;font-family:inherit;transition:all .15s}
.media-subtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.media-edit-btn{margin-left:auto;background:transparent;border:0.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--accent);padding:4px 10px;cursor:pointer;font-family:inherit}

/* 유튜브 카드 */
.yt-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.yt-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.yt-avatar{width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0}
.yt-info{flex:1}
.yt-name{font-size:14px;font-weight:500;color:var(--text)}
.yt-meta{font-size:11px;color:var(--text2);margin-top:2px}
.yt-badge-type{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;margin-right:4px}
.yt-badge-media{background:#fde8e8;color:#c84a31}
.yt-badge-ch{background:#e8f0fd;color:#185fa5}
.chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.yt-card.open .chevron{transform:rotate(180deg)}
.yt-body{display:none;border-top:0.5px solid var(--border);padding:14px 16px;background:var(--bg)}
.yt-card.open .yt-body{display:block}
.yt-updated{font-size:10px;color:var(--text3);margin-bottom:10px}
.yt-summary{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.yt-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;margin-top:10px}
.yt-link:hover{text-decoration:underline}

/* 포트폴리오 */
.pf-pw-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center}
.pf-pw-overlay.show{display:flex}
.pf-pw-box{background:#0d1117;border:1px solid #30363d;border-radius:16px;padding:28px 24px;width:320px;max-width:90vw}
.pf-dark{background:#0d1117;border-radius:var(--radius);padding:14px;color:#e6edf3}
.pf-kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:480px){.pf-kpi-row{grid-template-columns:repeat(4,1fr)}}
.pf-kpi{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px}
.pf-kpi-badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;margin-bottom:8px;letter-spacing:.3px}
.pf-kpi-num{font-size:18px;font-weight:900;color:#e6edf3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pf-kpi-won{font-size:11px;font-weight:400;color:#8b949e;margin-left:2px}
.pf-kpi-chg{font-size:11px;font-weight:700;margin-top:3px}
.pf-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.pf-tab{background:transparent;border:1px solid #30363d;border-radius:10px;font-size:11px;font-weight:700;color:#8b949e;padding:3px 12px;cursor:pointer;font-family:inherit}
.pf-tab.on{background:#c8fa00;color:#0d1117;border-color:#c8fa00}
.pf-content{display:none}.pf-content.on{display:block}
.pf-edit-input{width:100%;border:1px solid #30363d;border-radius:6px;padding:4px 6px;font-size:12px;font-family:inherit;background:#1c2128;color:#c9d1d9}
.pf-edit-select{width:100%;border:1px solid #30363d;border-radius:6px;padding:4px 6px;font-size:12px;font-family:inherit;background:#1c2128;color:#c9d1d9}
.pf-edit-table{width:100%;border-collapse:collapse;font-size:12px}
.pf-edit-table th{background:#161b22;color:#8b949e;font-weight:700;padding:6px 4px;text-align:left;border-bottom:1px solid #21262d;white-space:nowrap}
.pf-edit-table td{padding:3px 2px;vertical-align:middle;border-bottom:1px solid #1c2128}
.pftable td:first-child{color:#c9d1d9;cursor:default}
.pf-donut-wrap{display:flex;gap:14px;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap}
.pf-legend{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;max-height:130px;overflow-y:auto}
.pf-legend-item{display:flex;align-items:center;gap:6px;font-size:10px;white-space:nowrap;overflow:hidden;color:#c9d1d9}
.pf-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pf-pct{font-size:10px;white-space:nowrap}
.pf-pct.up{color:#3fb950}.pf-pct.down{color:#f85149}.pf-pct.flat{color:#484f58}
.pf-spark-td{width:70px;padding:2px 4px!important;vertical-align:middle}
.mkt-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-right:3px}
.mkt-kr{background:#e8f5e9;color:#2e7d32}.mkt-us{background:#e3f2fd;color:#1565c0}
.cash-item{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid #21262d;font-size:12px}
.cash-item:last-child{border-bottom:none}
.cash-bank{display:flex;align-items:center;gap:6px;font-weight:700;color:#c9d1d9}
.cash-amt{font-weight:700;color:#e6edf3;font-size:13px}
.cash-total-row{display:flex;justify-content:space-between;padding:8px 4px;border-top:2px solid #30363d;margin-top:4px;font-weight:700;font-size:12px;color:#e6edf3}
.sav-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:8px}
.sav-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sav-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:#1c2128;color:#8b949e}
.sav-bank{font-size:14px;font-weight:800;color:#e6edf3}
.sav-dday{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:auto}
.sav-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sav-item .sl{font-size:10px;color:#8b949e;margin-bottom:2px}
.sav-item .sv{font-size:13px;font-weight:700;color:#c9d1d9}
.autocomplete-list{position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:600;max-height:200px;overflow-y:auto;min-width:200px}
.ac-item{padding:7px 10px;font-size:11px;cursor:pointer;display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #21262d;color:#c9d1d9}
.ac-item:last-child{border-bottom:none}.ac-item:hover{background:#21262d}
.ac-sym{font-size:9px;color:#8b949e;font-weight:700;white-space:nowrap}
.sync-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#8b949e;margin-bottom:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#8b949e;flex-shrink:0}
.sync-dot.ok{background:#3fb950}.sync-dot.err{background:#f85149}

/* 편집 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:var(--radius);padding:20px;width:min(480px,94vw);max-height:85vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
.modal-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.edit-row{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border)}
.edit-row:last-child{border-bottom:none}
.edit-input{flex:1;border:0.5px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text)}
.edit-del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.add-btn{background:var(--bg);border:0.5px solid var(--border);border-radius:7px;color:var(--accent);font-size:11px;font-weight:600;padding:6px;cursor:pointer;font-family:inherit;width:100%;margin-top:6px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-cancel{background:var(--bg);color:var(--text2);border:none;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.pw-change-box{background:#0d1117;border:1px solid #30363d;border-radius:16px;padding:24px;width:min(360px,94vw)}

.no-data{text-align:center;color:var(--text3);font-size:13px;padding:24px 0}
.loading{text-align:center;color:var(--text3);font-size:13px;padding:40px 0}
.updated-bar{text-align:center;font-size:10px;color:var(--text3);padding:16px 0 8px}
</style>
</head>
<body>

<div class="fixed-top">
  <div class="header-row">
    <div class="logo">Invest Dash</div>
    <div class="updated-tag" id="updated-tag">-</div>
  </div>
  <div class="tabbar">
    <button class="tab active" onclick="switchTab('brief',this)">투자 브리핑</button>
    <button class="tab" onclick="switchTab('market',this)">증시</button>
    <button class="tab" onclick="switchTab('media',this)">미디어 분석</button>
    <button class="tab" onclick="switchTab('portfolio',this)">포트폴리오</button>
  </div>
</div>

<!-- 탭1: 투자 브리핑 -->
<div class="page active" id="page-brief">
<div class="wrap">
  <div class="loading" id="brief-loading">데이터 불러오는 중...</div>
  <div id="brief-content" style="display:none">
    <div class="card">
      <div class="card-title">AI 시황</div>
      <div id="ai-comment"></div>
    </div>
    <div class="card">
      <div class="card-title">주요 시장</div>
      <div class="market-grid" id="brief-market"></div>
    </div>
    <div class="card">
      <div class="card-title">주요 뉴스</div>
      <div class="news-filter">
        <button class="nf-btn on" onclick="filterBriefNews('all',this)">전체</button>

function fmtMan(krw){const a=Math.abs(krw);if(a>=100000000)return(krw/100000000).toFixed(1)+'억';return(krw/10000).toFixed(0)+'만';}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function yfetch(symbol,interval,range){
  const base='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval='+interval+'&range='+range;
  for(const pf of PROXY){
    try{const r=await fetch(pf(base),{signal:AbortSignal.timeout(10000)});if(!r.ok)continue;const j=await r.json();if(j?.chart?.result?.[0])return j;}catch(e){}
  }return null;
}

function drawSparkSVG(el,values,isUp,h){
  const w=el.clientWidth||180;h=h||76;const color=isUp?NAVER.up:NAVER.down;
  const mn=Math.min(...values),mx=Math.max(...values),rng=mx-mn||mx*.02||1;
  const px=2,py=3;const pts=values.map((v,i)=>[px+(i/(values.length-1))*(w-px*2),py+(1-(v-mn)/rng)*(h-py*2)]);
  let line=`M${pts[0][0]},${pts[0][1]}`;for(let i=1;i<pts.length;i++){const cx=(pts[i-1][0]+pts[i][0])/2;line+=` C${cx},${pts[i-1][1]} ${cx},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;}
  const fill=line+` L${pts[pts.length-1][0]},${h} L${pts[0][0]},${h} Z`;const gid='sg'+Math.random().toString(36).slice(2);
  el.innerHTML=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.1"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${fill}" fill="url(#${gid})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

async function switchCardPeriod(cbId,idx,btn){
  document.getElementById('cp-'+cbId)?.querySelectorAll('.cptab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const st=cardState[cbId];if(!st?.symbol)return;
  const[,interval,range]=CARD_PERIODS[idx];const el=document.getElementById(cbId);if(!el)return;
  el.innerHTML='<div style="text-align:center;color:var(--text3);line-height:72px;font-size:9px">...</div>';
  const data=await yfetch(st.symbol,interval,range);
  if(data?.chart?.result?.[0]){const q=data.chart.result[0].indicators.quote[0];const vals=(q.close||[]).filter(v=>v!=null);if(vals.length>=2){el.innerHTML='';drawSparkSVG(el,vals,st.isUp,76);new ResizeObserver(()=>{if(el.clientWidth>0){el.innerHTML='';drawSparkSVG(el,vals,st.isUp,76);}}).observe(el);}}
}
async function makeMiniChart(cbId,candles,isUp,symbol){
  const el=document.getElementById(cbId);if(!el)return;el.innerHTML='';let vals=[];
  if(symbol){const data=await yfetch(symbol,'5m','1d');if(data?.chart?.result?.[0]){const q=data.chart.result[0].indicators.quote[0];vals=(q.close||[]).filter(v=>v!=null);}}
  if(vals.length<2&&candles)vals=[...candles].sort((a,b)=>a.time-b.time).map(c=>c.close).filter(v=>v!=null);
  if(vals.length<2)return;
  cardState[cbId]={...(cardState[cbId]||{}),currentVals:vals};
  drawSparkSVG(el,vals,isUp,76);new ResizeObserver(()=>{if(el.clientWidth>0){el.innerHTML='';drawSparkSVG(el,vals,isUp,76);}}).observe(el);
}

async function loadStockTab(tab){

  let list=[];
  if(tab==='mine'){
    const holdings=lsGet('pf_holdings')||[];
    list=holdings.map(h=>({n:h.name,s:h.symbol}));

    list=US_TOP50;
  }else if(tab==='up'){
    list=SECTOR_UP;
  }else if(tab==='down'){
    list=SECTOR_DOWN;
  }

  const results=await Promise.all(list.map(s=>yfetch(s.s,'1d','5d')));
  const rows=list.map((s,i)=>{
    try{const meta=results[i].chart.result[0].meta;const p=meta.regularMarketPrice,prev=meta.chartPreviousClose||p,c=p-prev;return{n:s.n,s:s.s,p,c,pct:prev?c/prev*100:0,vol:meta.regularMarketVolume||0,h:meta.regularMarketDayHigh||0,l:meta.regularMarketDayLow||0};}
    catch(e){return null;}
  }).filter(Boolean);

  if(tab==='kr'&&rows.length)kr50Cache=[...rows];
  if(tab==='us'&&rows.length)us50Cache=[...rows];

  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:10px">데이터 없음</td></tr>';return;}
  tbody.innerHTML=rows.map(d=>{const c=cls(d.pct);return`<tr><td onclick="openDetail('${d.n}','${d.s}')">${d.n}</td><td>${d.p.toLocaleString(undefined,{maximumFractionDigits:2})}</td><td class="${c}">${sign(d.c)}${Math.abs(d.c)<1?d.c.toFixed(2):d.c.toFixed(0)}</td><td class="${c}">${sign(d.pct)}${d.pct.toFixed(2)}%</td><td>${d.vol?(d.vol/1000).toFixed(0)+'K':'-'}</td><td>${d.h.toLocaleString(undefined,{maximumFractionDigits:0})}</td><td>${d.l.toLocaleString(undefined,{maximumFractionDigits:0})}</td></tr>`;}).join('');
}

function calcPeriodChg(cur,closes,ts){
  if(!closes?.length||!ts?.length)return{d1:null,mo1:null};
  const valid=ts.map((t,i)=>closes[i]!=null?{t,v:closes[i]}:null).filter(Boolean);if(valid.length<2)return{d1:null,mo1:null};
  const now=valid[valid.length-1].t;const find=days=>{const target=now-days*86400;let b=null,bd=Infinity;valid.forEach(p=>{const d=Math.abs(p.t-target);if(d<bd){bd=d;b=p.v;}});return b;};
  const prev1d=valid[valid.length-2].v;const pct=base=>base&&cur?((cur-base)/base*100):null;
  return{d1:pct(prev1d),mo1:pct(find(30))};
}
function drawDonut(el,data){
  if(!data?.length){el.innerHTML='';return;}
  const total=data.reduce((s,d)=>s+(d.v||0),0);if(!total){el.innerHTML='';return;}
  const wp=data.filter(d=>d.v>0).map((d,i)=>({...d,pct:d.v/total*100,color:d.color||PF_COLORS[i%PF_COLORS.length]}));
  const r=54,cx=70,cy=70,sw=22,sz=140;let cA=-Math.PI/2;
  const arcs=wp.map(d=>{const a=d.v/total*2*Math.PI;const x1=cx+r*Math.cos(cA),y1=cy+r*Math.sin(cA);const na=cA+a,x2=cx+r*Math.cos(na),y2=cy+r*Math.sin(na);const arc=`<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${a>Math.PI?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-linecap="butt"/>`;cA=na;return arc;});
  const svg=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1c2128" stroke-width="${sw}"/>${arcs.join('')}<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" font-weight="700" fill="#e6edf3" font-family="inherit">${wp.length}개</text><text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="9" fill="#8b949e" font-family="inherit">포트폴리오</text></svg>`;
  const legend=wp.map(d=>`<div class="pf-legend-item"><div class="pf-legend-dot" style="background:${d.color}"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${d.n}</span><span style="color:#8b949e;flex-shrink:0;margin-left:4px">${d.pct.toFixed(1)}%</span></div>`).join('');
  el.innerHTML=`<div class="pf-donut-wrap"><div style="flex-shrink:0">${svg}</div><div class="pf-legend">${legend}</div></div>`;
}
function pfSpark(vals,isUp){
  if(!vals?.length)return'';const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||mn*.02||1;const c=isUp?'#3fb950':'#f85149';
  const pts=vals.map((v,i)=>[1+(i/(vals.length-1))*68,2+(1-(v-mn)/rng)*24]);let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for(let i=1;i<pts.length;i++){const cx=(pts[i-1][0]+pts[i][0])/2;d+=` C${cx.toFixed(1)},${pts[i-1][1].toFixed(1)} ${cx.toFixed(1)},${pts[i][1].toFixed(1)} ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`;}
  return`<svg width="70" height="28" viewBox="0 0 70 28"><path d="${d}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

async function loadPortfolio(){
  const usdkrw=jsonData?.market?.usdkrw?.price||1380;
  const stocks=lsGet('pf_holdings')||[];const cash=lsGet('pf_cash')||[];const savings=lsGet('pf_savings')||[];
  renderCash(cash);renderSavings(savings);
  const totalCashKrw=cash.reduce((s,c)=>s+(c.currency==='USD'?c.amount*usdkrw:c.amount||0),0);
  const totalSavingsKrw=savings.reduce((s,sv)=>s+(sv.currency==='USD'?sv.maturity_amount*usdkrw:sv.maturity_amount||0),0);
  if(!stocks.length){renderKPI(0,0,0,totalCashKrw,totalSavingsKrw);document.getElementById('pftb').innerHTML='<tr><td colspan="9" style="text-align:center;color:#8b949e;padding:20px">편집 버튼으로 주식을 입력하세요</td></tr>';return;}
  document.getElementById('pftb').innerHTML='<tr><td colspan="9" style="text-align:center;color:#8b949e;padding:20px">가격 조회 중...</td></tr>';
  const resolved=await Promise.all(stocks.map(async h=>{
    let cur=null,closes=[],timestamps=[];
    const d=await yfetch(h.symbol,'1d','1y');
    if(d?.chart?.result?.[0]){const res=d.chart.result[0];cur=res.meta.regularMarketPrice;closes=res.indicators.quote[0].close||[];timestamps=res.timestamp||[];}
    if(!cur){const k=Object.keys(KEY_TO_YF).find(k=>KEY_TO_YF[k]===h.symbol);if(k&&jsonData?.market?.[k])cur=jsonData.market[k].price;}
    if(!cur)cur=h.avg_price;
    const periods=calcPeriodChg(cur,closes,timestamps);const rate=h.currency==='USD'?usdkrw:1;
    const cost_krw=h.avg_price*rate*h.qty,value_krw=cur*rate*h.qty,pnl_krw=value_krw-cost_krw,pnl_pct=cost_krw?pnl_krw/cost_krw*100:0;
    return{name:h.name,symbol:h.symbol,qty:h.qty,avg_price:h.avg_price,currency:h.currency,market:h.market,current_price:cur,value_krw,cost_krw,pnl_krw,pnl_pct,periods,spark:closes.filter(v=>v!=null).slice(-60)};
  }));
  const totalStockVal=resolved.reduce((s,h)=>s+h.value_krw,0);const totalStockCost=resolved.reduce((s,h)=>s+h.cost_krw,0);const totalPnl=totalStockVal-totalStockCost;const totalPnlPct=totalStockCost?totalPnl/totalStockCost*100:0;
  renderKPI(totalStockVal,totalPnl,totalPnlPct,totalCashKrw,totalSavingsKrw);
  drawDonut(document.getElementById('pf-donut'),resolved.filter(h=>h.value_krw>0).map((h,i)=>({n:h.name,v:h.value_krw,color:PF_COLORS[i%PF_COLORS.length]})));
  const fp=v=>v!=null?`<span class="pf-pct ${cls(v)}">${v>=0?'+':''}${v.toFixed(1)}%</span>`:'<span class="pf-pct flat">-</span>';
  document.getElementById('pftb').innerHTML=resolved.map(h=>{const c=cls(h.pnl_pct);const sg=h.pnl_pct>=0?'+':'';const mkt=h.market==='KR'?'<span class="mkt-badge mkt-kr">KR</span>':'<span class="mkt-badge mkt-us">US</span>';return`<tr><td style="cursor:default">${mkt}<span style="font-weight:700;color:#e6edf3">${h.name}</span><br><small style="color:#8b949e;font-size:9px">${h.symbol}</small></td><td style="color:#c9d1d9">${h.qty.toLocaleString()}</td><td style="color:#8b949e">${h.currency==='USD'?'$':''}${h.avg_price.toLocaleString(undefined,{maximumFractionDigits:2})}</td><td style="color:#e6edf3;font-weight:700">${h.currency==='USD'?'$':''}${h.current_price.toLocaleString(undefined,{maximumFractionDigits:2})}</td><td>${fp(h.periods?.d1)}</td><td>${fp(h.periods?.mo1)}</td><td style="color:#e6edf3">${fmtMan(h.value_krw)}원</td><td class="${c}" style="font-weight:700">${sg}${h.pnl_pct.toFixed(2)}%<br><small style="font-size:9px;font-weight:400">${sg}${fmtMan(h.pnl_krw)}원</small></td><td class="pf-spark-td">${pfSpark(h.spark,h.pnl_pct>=0)}</td></tr>`;}).join('');
}
function renderKPI(stockKrw,pnlKrw,pnlPct,cashKrw,savingsKrw){
  const total=stockKrw+cashKrw+savingsKrw;
  const kpis=[{badge:'현금',bc:'#7c3aed',bbg:'rgba(124,58,237,.15)',v:cashKrw,chg:null},{badge:'예적금',bc:'#db2777',bbg:'rgba(219,39,119,.15)',v:savingsKrw,chg:null},{badge:'주식',bc:'#c8fa00',bbg:'rgba(200,250,0,.12)',v:stockKrw,chg:pnlPct,pnl:pnlKrw},{badge:'총자산',bc:'#e6edf3',bbg:'rgba(230,237,243,.08)',v:total,chg:null}];
  document.getElementById('pf-kpi').innerHTML=kpis.map(k=>{const numStr=k.v>=100000000?(k.v/100000000).toFixed(1)+'억':Math.round(k.v/10000).toLocaleString()+'만';const chgHtml=k.chg!=null?`<div class="pf-kpi-chg ${cls(k.chg)}">${k.chg>=0?'+':''}${k.chg.toFixed(2)}%</div>`:'';return`<div class="pf-kpi"><div class="pf-kpi-badge" style="background:${k.bbg};color:${k.bc}">${k.badge}</div><div class="pf-kpi-num">${numStr}<span class="pf-kpi-won">원</span></div>${chgHtml}</div>`;}).join('');
}
function renderCash(items){const el=document.getElementById('pf-cash-list');if(!items?.length){el.innerHTML='<div style="text-align:center;color:#484f58;padding:16px">현금 없음</div>';return;}let total=0;el.innerHTML=items.map(c=>{const amt=c.amount||0;if(c.currency==='KRW')total+=amt;return`<div class="cash-item"><div class="cash-bank">${c.bank} <span style="font-size:10px;color:#8b949e;font-weight:400">${c.currency}</span></div><div class="cash-amt">${amt.toLocaleString()}원</div></div>`;}).join('')+`<div class="cash-total-row"><span>합계</span><span style="color:#3fb950">${total.toLocaleString()}원</span></div>`;}
function renderSavings(items){const el=document.getElementById('pf-savings-list');if(!items?.length){el.innerHTML='<div style="text-align:center;color:#484f58;padding:16px">예적금 없음</div>';return;}el.innerHTML=items.map(s=>{const diff=Math.round((new Date(s.maturity)-new Date())/86400000);const dStr=diff>=0?`D-${diff.toLocaleString()}`:`D+${Math.abs(diff).toLocaleString()}`;const dColor=diff>365?'#3fb950':diff>90?'#d97706':'#f85149';return`<div class="sav-card"><div class="sav-header"><span class="sav-type">${s.type||'예금'}</span><span class="sav-bank">${s.bank}</span><span class="sav-dday" style="background:${diff>0?'#0d2818':'#2d0f0f'};color:${dColor}">${dStr}</span></div><div class="sav-grid"><div class="sav-item"><div class="sl">만기일</div><div class="sv">${s.maturity}</div></div><div class="sav-item"><div class="sl">이율</div><div class="sv" style="color:#3fb950">${s.rate_pct}%</div></div><div class="sav-item"><div class="sl">만기금액</div><div class="sv">${(s.maturity_amount||0).toLocaleString()}원</div></div><div class="sav-item"><div class="sl">통화</div><div class="sv">${s.currency||'KRW'}</div></div></div></div>`;}).join('');}
function switchPfTab(tab,btn){document.querySelectorAll('.pf-tab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.pf-content').forEach(c=>c.classList.remove('on'));btn.classList.add('on');document.getElementById('pf-'+tab+'-tab').classList.add('on');}

// 포트폴리오 편집
let acHideTimer=null;
function showAcList(idx,query,inputEl){
  clearTimeout(acHideTimer);let list=document.getElementById('ac-global');
  if(!list){list=document.createElement('div');list.id='ac-global';list.className='autocomplete-list';document.body.appendChild(list);}
  if(!query||query.length<1){list.style.display='none';return;}
  const q=query.toLowerCase();const matches=SYMBOL_DB.filter(s=>s.n.toLowerCase().includes(q)||s.s.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){list.style.display='none';return;}
  const rect=inputEl.getBoundingClientRect();list.style.cssText=`position:fixed;top:${rect.bottom+2}px;left:${rect.left}px;width:${Math.max(rect.width,220)}px;display:block;z-index:600`;
  list.innerHTML=matches.map(m=>`<div class="ac-item" data-idx="${idx}" data-n="${encodeURIComponent(m.n)}" data-s="${encodeURIComponent(m.s)}" data-m="${m.m}" onmousedown="selectAc(this)"><span>${m.n}</span><span class="ac-sym">${m.s} ${m.m}</span></div>`).join('');
}
function selectAc(el){const idx=el.dataset.idx,name=decodeURIComponent(el.dataset.n),symbol=decodeURIComponent(el.dataset.s),market=el.dataset.m;const n=document.getElementById('pf-name-'+idx);const s=document.getElementById('pf-sym-'+idx);const m=document.getElementById('pf-mkt-'+idx);const c=document.getElementById('pf-cur-'+idx);if(n)n.value=name;if(s)s.value=symbol;if(m)m.value=market;if(c)c.value=market==='US'?'USD':'KRW';const list=document.getElementById('ac-global');if(list)list.style.display='none';}
function hideAc(){acHideTimer=setTimeout(()=>{const list=document.getElementById('ac-global');if(list)list.style.display='none';},200);}
document.addEventListener('click',e=>{const list=document.getElementById('ac-global');if(list&&!list.contains(e.target))list.style.display='none';});

function togglePfEdit(){
  pfEditData=lsGet('pf_holdings')||[];pfCashEditData=lsGet('pf_cash')||[];pfSavingsEditData=lsGet('pf_savings')||[];
  renderPfRows();renderCashRows();renderSavingsRows();
  document.getElementById('pf-stock-view').style.display='none';document.getElementById('pf-stock-edit').style.display='block';
  document.getElementById('pf-cash-view').style.display='none';document.getElementById('pf-cash-edit').style.display='block';
  document.getElementById('pf-savings-view').style.display='none';document.getElementById('pf-savings-edit').style.display='block';
  document.getElementById('pf-edit-btn').style.display='none';document.getElementById('pf-save-btn').style.display='';document.getElementById('pf-cancel-btn').style.display='';
}
function cancelPfEdit(){exitEdit();}
function exitEdit(){document.getElementById('pf-stock-view').style.display='';document.getElementById('pf-stock-edit').style.display='none';document.getElementById('pf-cash-view').style.display='';document.getElementById('pf-cash-edit').style.display='none';document.getElementById('pf-savings-view').style.display='';document.getElementById('pf-savings-edit').style.display='none';document.getElementById('pf-edit-btn').style.display='';document.getElementById('pf-save-btn').style.display='none';document.getElementById('pf-cancel-btn').style.display='none';}
function renderPfRows(){document.getElementById('pf-edit-tbody').innerHTML=pfEditData.map((h,i)=>`<tr><td style="min-width:100px"><input id="pf-name-${i}" class="pf-edit-input" value="${escHtml(h.name)}" placeholder="종목명" oninput="showAcList(${i},this.value,this)" onblur="hideAc()"></td><td><input id="pf-sym-${i}" class="pf-edit-input" value="${escHtml(h.symbol)}" placeholder="심볼" style="min-width:70px"></td><td><select id="pf-mkt-${i}" class="pf-edit-select" style="min-width:55px"><option value="KR"${h.market==='KR'?' selected':''}>KR</option><option value="US"${h.market==='US'?' selected':''}>US</option></select></td><td><input id="pf-qty-${i}" class="pf-edit-input" type="number" value="${h.qty}" style="min-width:50px"></td><td><input id="pf-avg-${i}" class="pf-edit-input" type="number" value="${h.avg_price}" style="min-width:65px"></td><td><select id="pf-cur-${i}" class="pf-edit-select" style="min-width:52px"><option value="KRW"${h.currency==='KRW'?' selected':''}>KRW</option><option value="USD"${h.currency==='USD'?' selected':''}>USD</option></select></td><td><button onclick="delPfRow(${i})" style="background:none;border:none;color:#f85149;font-size:18px;cursor:pointer;padding:0 4px;line-height:1">&#215;</button></td></tr>`).join('');}
function collectPf(){pfEditData=[];const n=document.getElementById('pf-edit-tbody').querySelectorAll('tr').length;for(let i=0;i<n;i++){pfEditData.push({name:document.getElementById('pf-name-'+i)?.value||'',symbol:document.getElementById('pf-sym-'+i)?.value||'',market:document.getElementById('pf-mkt-'+i)?.value||'KR',qty:parseFloat(document.getElementById('pf-qty-'+i)?.value)||0,avg_price:parseFloat(document.getElementById('pf-avg-'+i)?.value)||0,currency:document.getElementById('pf-cur-'+i)?.value||'KRW'});}}
function addPfRow(){collectPf();pfEditData.push({name:'',symbol:'',market:'KR',qty:1,avg_price:0,currency:'KRW'});renderPfRows();}
function delPfRow(i){collectPf();pfEditData.splice(i,1);renderPfRows();}
function renderCashRows(){document.getElementById('pf-cash-tbody').innerHTML=pfCashEditData.map((c,i)=>`<tr><td><input id="pfc-bank-${i}" class="pf-edit-input" value="${escHtml(c.bank)}" placeholder="은행명" style="min-width:80px"></td><td><select id="pfc-cur-${i}" class="pf-edit-select" style="min-width:56px"><option value="KRW"${c.currency==='KRW'?' selected':''}>KRW</option><option value="USD"${c.currency==='USD'?' selected':''}>USD</option></select></td><td><input id="pfc-amt-${i}" class="pf-edit-input" type="number" value="${c.amount||0}" style="min-width:90px"></td><td><button onclick="delCashRow(${i})" style="background:none;border:none;color:#f85149;font-size:18px;cursor:pointer;padding:0 4px;line-height:1">&#215;</button></td></tr>`).join('');}
function collectCash(){pfCashEditData=[];const n=document.getElementById('pf-cash-tbody').querySelectorAll('tr').length;for(let i=0;i<n;i++){pfCashEditData.push({bank:document.getElementById('pfc-bank-'+i)?.value||'',currency:document.getElementById('pfc-cur-'+i)?.value||'KRW',amount:parseFloat(document.getElementById('pfc-amt-'+i)?.value)||0});}}
function addCashRow(){collectCash();pfCashEditData.push({bank:'',currency:'KRW',amount:0});renderCashRows();}
function delCashRow(i){collectCash();pfCashEditData.splice(i,1);renderCashRows();}
function renderSavingsRows(){document.getElementById('pf-savings-tbody').innerHTML=pfSavingsEditData.map((s,i)=>`<tr><td><input id="pfs-type-${i}" class="pf-edit-input" value="${escHtml(s.type||'적금')}" style="min-width:48px"></td><td><input id="pfs-bank-${i}" class="pf-edit-input" value="${escHtml(s.bank)}" style="min-width:55px"></td><td><input id="pfs-mat-${i}" class="pf-edit-input" type="date" value="${s.maturity||''}" style="min-width:120px"></td><td><input id="pfs-rate-${i}" class="pf-edit-input" type="number" step="0.01" value="${s.rate_pct||0}" style="min-width:48px"></td><td><input id="pfs-amt-${i}" class="pf-edit-input" type="number" value="${s.maturity_amount||0}" style="min-width:90px"></td><td><select id="pfs-cur-${i}" class="pf-edit-select" style="min-width:54px"><option value="KRW"${(s.currency||'KRW')==='KRW'?' selected':''}>KRW</option><option value="USD"${s.currency==='USD'?' selected':''}>USD</option></select></td><td><button onclick="delSavingsRow(${i})" style="background:none;border:none;color:#f85149;font-size:18px;cursor:pointer;padding:0 4px;line-height:1">&#215;</button></td></tr>`).join('');}
function collectSavings(){pfSavingsEditData=[];const n=document.getElementById('pf-savings-tbody').querySelectorAll('tr').length;for(let i=0;i<n;i++){pfSavingsEditData.push({type:document.getElementById('pfs-type-'+i)?.value||'적금',bank:document.getElementById('pfs-bank-'+i)?.value||'',maturity:document.getElementById('pfs-mat-'+i)?.value||'',rate_pct:parseFloat(document.getElementById('pfs-rate-'+i)?.value)||0,maturity_amount:parseFloat(document.getElementById('pfs-amt-'+i)?.value)||0,currency:document.getElementById('pfs-cur-'+i)?.value||'KRW'});}}
function addSavingsRow(){collectSavings();pfSavingsEditData.push({type:'적금',bank:'',maturity:'',rate_pct:0,maturity_amount:0,currency:'KRW'});renderSavingsRows();}
function delSavingsRow(i){collectSavings();pfSavingsEditData.splice(i,1);renderSavingsRows();}
async function savePfInline(){
  collectPf();collectCash();collectSavings();
  localStorage.setItem('pf_holdings',JSON.stringify(pfEditData.filter(h=>h.name&&h.symbol&&h.qty>0)));
  localStorage.setItem('pf_cash',JSON.stringify(pfCashEditData.filter(c=>c.bank)));
  localStorage.setItem('pf_savings',JSON.stringify(pfSavingsEditData.filter(s=>s.bank)));
  exitEdit();await loadPortfolio();
}

// ═══════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════
loadData();
</script>
